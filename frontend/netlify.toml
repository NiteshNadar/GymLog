[build]
  command = "npm install && npm run build"
  publish = "dist"
  base = "frontend"

[build.environment]
  NODE_VERSION = "18"

# SPA client-side routing — redirect all paths to index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[dev]
  command = "vite"
  port = 3000
  publish = "dist"